      border-radius: 16px;

    .panel {
      margin-top: 18px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: end;
    }

    .filter {
      display: grid;
      gap: 6px;
    }

    .filter label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .filter input,
    .filter select,
    .filter button {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .filter button {

      color: #fff;
      border-color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }

    .filter button:hover {

    }

    #summary-line {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    table {
      width: 100%;
      min-width: 1300px;
      border-collapse: collapse;
      background: #fff;
    }

    thead {

    th,

      text-align: left;
      font-size: 13px;

      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);

    th button .sort-indicator {

    .status {

    .empty {

      }
    }
